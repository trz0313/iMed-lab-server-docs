site_name: iMED Lab Server Guide
site_description: Public guide for iMED lab GPU workstations
site_url: https://trz0313.github.io/iMed-lab-server-docs/

repo_url: https://github.com/trz0313/iMed-lab-server-docs
repo_name: trz0313/iMed-lab-server-docs

theme:
  name: material
  language: en
  font: false
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Connect:
      - VPN: vpn.md
      - SSH Login: ssh-login.md
      - VS Code Remote SSH: vscode-remote.md
  - Work:
      - Directory Structure: directories.md
      - Data Management: data-management.md
      - Conda Environment: conda.md
  - Operate:
      - GPU Usage Rules: gpu-usage.md
      - Hardware Dashboard: dashboard.md
      - Long-Use Tracker: usage-tracker.md
  - Help:
      - FAQ: faq.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
